<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warning Page</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #222;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    border: 2px solid red;
}
h1 {
    color: red;
}
button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}
.continue {
    background: red;
    color: white;
}
.back {
    background: gray;
    color: white;
}
</style>

</head>
<body>

<div class="box">
    <h1>⚠ Warning</h1>
    <p>You are entering a restricted area.</p>
    <p>Please confirm to continue.</p>

    <button class="back" onclick="goBack()">Go Back</button>
    <button class="continue" onclick="goNext()">Continue</button>
</div>

<script>
function goBack() {
    window.history.back();
}
function goNext() {
    window.location.href = "email.html";
}
</script>

</body>
</html>
